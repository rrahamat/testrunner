name: IDMC UAT Pull by Commit
 
on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: "Git commit hash to pull into IDMC UAT"
        required: true
        type: string
 
permissions:
  contents: read
 
jobs:
  pull-uat:
    runs-on: ubuntu-latest
 
    env:
      IDMC_LOGIN_URL: ${{ secrets.IDMC_UAT_LOGIN_URL }}
      IDMC_USERNAME: ${{ secrets.IDMC_UAT_USERNAME }}
      IDMC_PASSWORD: ${{ secrets.IDMC_UAT_PASSWORD }}
      COMMIT_HASH: ${{ github.event.inputs.commit_hash }}
 
    steps:
      - name: Login to IDMC UAT
        id: login
        run: |
          set -e
 
          RESPONSE=$(curl -sS -X POST "$IDMC_LOGIN_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"$IDMC_USERNAME\",
              \"password\": \"$IDMC_PASSWORD\"
            }")
 
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.icSessionId')
          SERVER_URL=$(echo "$RESPONSE" | jq -r '.serverUrl')
 
          if [ -z "$SESSION_ID" ] || [ "$SESSION_ID" = "null" ]; then
            echo "IDMC login failed"
            echo "$RESPONSE"
            exit 1
          fi
 
          echo "::add-mask::$SESSION_ID"
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "server_url=$SERVER_URL" >> "$GITHUB_OUTPUT"
 
      - name: Pull commit into IDMC UAT
        id: pull
        run: |
          set -e
 
          SERVER_URL="${{ steps.login.outputs.server_url }}"
          SESSION_ID="${{ steps.login.outputs.session_id }}"
 
          RESPONSE=$(curl -sS -X POST "$SERVER_URL/public/core/v3/pullByCommitHash" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "INFA-SESSION-ID: $SESSION_ID" \
            -d "{
              \"commitHash\": \"$COMMIT_HASH\"
            }")
 
          echo "$RESPONSE" | jq .
 
          ACTION_ID=$(echo "$RESPONSE" | jq -r '.actionId // .pullActionId')
 
          if [ -z "$ACTION_ID" ] || [ "$ACTION_ID" = "null" ]; then
            echo "Pull action ID not returned"
            exit 1
          fi
 
          echo "action_id=$ACTION_ID" >> "$GITHUB_OUTPUT"
 
      - name: Monitor pull status
        run: |
          set -e
 
          SERVER_URL="${{ steps.login.outputs.server_url }}"
          SESSION_ID="${{ steps.login.outputs.session_id }}"
          ACTION_ID="${{ steps.pull.outputs.action_id }}"
 
          for i in {1..30}; do
            RESPONSE=$(curl -sS -X GET \
              "$SERVER_URL/public/core/v3/sourceControlAction/$ACTION_ID?expand=objects" \
              -H "Accept: application/json" \
              -H "INFA-SESSION-ID: $SESSION_ID")
 
            echo "$RESPONSE" | jq .
 
            STATE=$(echo "$RESPONSE" | jq -r '.state // .status.state // .status')
 
            if [[ "$STATE" == "SUCCESS" || "$STATE" == "SUCCESSFUL" || "$STATE" == "COMPLETED" ]]; then
              echo "IDMC UAT pull completed successfully"
              exit 0
            fi
 
            if [[ "$STATE" == "FAILED" || "$STATE" == "ERROR" || "$STATE" == "CANCELLED" ]]; then
              echo "IDMC UAT pull failed"
              exit 1
            fi
 
            echo "Current state: $STATE. Waiting..."
            sleep 20
          done
 
          echo "Timed out waiting for pull completion"
          exit 1
